name: Releases

on:
  push:
    tags:
      - "*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        run: rm -rf $AGENT_TOOLSDIRECTORY

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version-file: .java-version

      - name: Install Rust Toolchain
        run: rustup target add thumbv7neon-linux-androideabi

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./app/src/main/rust"

      - name: CMake Cache
        uses: actions/cache/restore@v5
        with:
          path: app/.cxx
          key: cmake-

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-encryption-key: ${{ secrets.GradleEncryptionKey }}
          cache-read-only: true

      - name: Generate Baseline Profile
        run: ./gradlew generateBaselineProfile
          -Pandroid.testoptions.manageddevices.emulator.gpu="swiftshader_indirect"
          -Prelease

      - name: Build
        run: ./gradlew assembleRelease
          -Prelease

      - name: Rename Apks
        run: |
          mv app/build/outputs/apk/default/release/app-default-universal-release.apk LocalViewer-${{ github.ref_name }}-default-universal.apk
          mv app/build/outputs/apk/default/release/app-default-arm64-v8a-release.apk LocalViewer-${{ github.ref_name }}-default-arm64-v8a.apk
          mv app/build/outputs/apk/default/release/app-default-x86_64-release.apk LocalViewer-${{ github.ref_name }}-default-x86_64.apk
          mv app/build/outputs/apk/default/release/app-default-armeabi-v7a-release.apk LocalViewer-${{ github.ref_name }}-default-armeabi-v7a.apk
          mv app/build/outputs/mapping/defaultRelease/mapping.txt LocalViewer-${{ github.ref_name }}-default-mapping.txt
          mv app/build/outputs/native-debug-symbols/defaultRelease/native-debug-symbols.zip LocalViewer-${{ github.ref_name }}-default-native-debug-symbols.zip

      - name: Releases
        uses: softprops/action-gh-release@v3
        with:
          body: Bump Version
          files: |
            LocalViewer-${{ github.ref_name }}-default-universal.apk
            LocalViewer-${{ github.ref_name }}-default-arm64-v8a.apk
            LocalViewer-${{ github.ref_name }}-default-x86_64.apk
            LocalViewer-${{ github.ref_name }}-default-armeabi-v7a.apk
            LocalViewer-${{ github.ref_name }}-default-mapping.txt
            LocalViewer-${{ github.ref_name }}-default-native-debug-symbols.zip
